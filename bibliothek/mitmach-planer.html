<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SISU Paket-Finder für Bibliotheken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F0E8;
    --paper:#FCFAF5;
    --paper-2:#F7F3EB;
    --ink:#2A323D;
    --ink-2:#4D5765;
    --ink-3:#7A8493;
    --line:#DCD5C7;
    --line-soft:#E8E2D4;
    --sage-deep:#5F7460;
    --sage:#869A82;
    --sage-soft:#DCE3D5;
    --sage-tint:#EDF1E7;
    --bluegrey:#3E4A5B;
    --bluegrey-soft:#E2E5EA;
    --sand:#C9A86A;
    --sand-soft:#F0E5CC;
    --danger:#A85B4F;
    --radius-card:14px;
    --radius-btn:10px;
    --radius-chip:999px;
    --shadow-sm:0 1px 2px rgba(40,46,55,.04), 0 0 0 1px var(--line-soft);
    --shadow-md:0 1px 2px rgba(40,46,55,.04), 0 8px 24px -12px rgba(40,46,55,.10), 0 0 0 1px var(--line-soft);
    --shadow-lg:0 1px 2px rgba(40,46,55,.04), 0 24px 48px -20px rgba(40,46,55,.18), 0 0 0 1px var(--line-soft);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:16px;
    line-height:1.55;
    font-feature-settings:"ss01","cv11";
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-0.01em}
  .mono{font-variant-numeric:tabular-nums}

  /* ---------- Layout shell ---------- */
  .app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{
    position:sticky;top:0;z-index:30;
    background:rgba(244,240,232,.85);
    backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--line-soft);
  }
  .topbar-inner{
    max-width:1200px;margin:0 auto;
    padding:18px 32px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;
    background:var(--sage-deep);
    display:grid;place-items:center;
    color:var(--paper);
    font-family:'Instrument Serif',serif;
    font-size:20px;line-height:1;
    padding-top:2px;
  }
  .brand-name{font-weight:600;letter-spacing:.02em;font-size:15px}
  .brand-sub{color:var(--ink-3);font-size:13px;margin-left:6px}

  .nav{display:flex;gap:4px;align-items:center}
  .nav button{
    background:transparent;border:0;
    font:inherit;font-size:13px;color:var(--ink-2);
    padding:8px 12px;border-radius:8px;cursor:pointer;
    letter-spacing:.01em;
  }
  .nav button:hover{background:var(--paper-2);color:var(--ink)}
  .nav button.active{background:var(--bluegrey);color:#fff}

  /* Engagierten-Portal Tab – visuell abgesetzt, rechtsbündig */
  .nav button.portal-tab{
    margin-left:auto;
    background:var(--sage-tint);
    color:var(--sage-deep);
    font-weight:500;
    padding:8px 14px;
  }
  .nav button.portal-tab:hover{background:var(--sage-soft);color:var(--sage-deep)}
  .nav button.portal-tab.active{background:var(--sage-deep);color:#FCFAF5}

  /* FAQ-Akkordeon im Portal */
  details.faq-item{
    background:var(--paper);
    border:1px solid var(--line-soft);
    border-radius:10px;
    padding:14px 18px;
    transition:border-color .2s, background .2s;
  }
  details.faq-item[open]{border-color:var(--sage-soft);background:var(--sage-tint)}
  details.faq-item > summary{
    cursor:pointer;
    list-style:none;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    font-weight:600;
    color:var(--ink);
    font-size:15.5px;
  }
  details.faq-item > summary::-webkit-details-marker{display:none}
  details.faq-item > summary::marker{display:none}
  details.faq-item > summary .faq-toggle{
    color:var(--sage-deep);
    font-size:22px;
    line-height:1;
    transition:transform .2s;
    flex-shrink:0;
  }
  details.faq-item[open] > summary .faq-toggle{transform:rotate(45deg)}
  details.faq-item > p{
    margin:12px 0 0;
    color:var(--ink-2);
    font-size:14.5px;
    line-height:1.6;
  }

  .container{max-width:1080px;margin:0 auto;padding:48px 32px 96px;width:100%}
  .container.narrow{max-width:780px}
  .container.wide{max-width:1200px}

  /* ---------- Progress ---------- */
  .progress{
    max-width:1080px;margin:0 auto;padding:20px 32px 0;
    display:flex;align-items:center;gap:16px;
  }
  .progress-track{flex:1;height:3px;background:var(--line-soft);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--sage-deep);transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .progress-label{color:var(--ink-3);font-size:13px;letter-spacing:.02em;white-space:nowrap}

  /* ---------- Typography ---------- */
  h1.display{
    font-family:'Instrument Serif',serif;
    font-weight:400;
    font-size:clamp(38px,5vw,58px);
    line-height:1.05;
    letter-spacing:-0.015em;
    margin:0 0 20px;
    color:var(--ink);
  }
  h2.section{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:clamp(28px,3vw,38px);line-height:1.1;
    letter-spacing:-0.01em;margin:0 0 14px;
  }
  .lede{
    color:var(--ink-2);font-size:18px;line-height:1.55;
    max-width:62ch;margin:0 0 40px;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--sage-deep);font-weight:500;
    margin-bottom:18px;
  }
  .eyebrow::before{content:"";width:18px;height:1px;background:var(--sage-deep)}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font:inherit;font-weight:500;font-size:15px;
    padding:13px 22px;border-radius:var(--radius-btn);
    border:1px solid transparent;cursor:pointer;
    transition:all .15s ease;letter-spacing:.005em;
    text-decoration:none;
  }
  .btn-primary{background:var(--sage-deep);color:#FCFAF5;border-color:var(--sage-deep)}
  .btn-primary:hover{background:#506452;border-color:#506452}
  .btn-primary:disabled{background:var(--sage);border-color:var(--sage);opacity:.6;cursor:not-allowed}
  .btn-secondary{background:var(--paper);color:var(--ink);border-color:var(--line)}
  .btn-secondary:hover{background:var(--paper-2);border-color:#C9C0AE}
  .btn-ghost{background:transparent;color:var(--ink-2);border-color:transparent}
  .btn-ghost:hover{color:var(--ink);background:var(--paper-2)}
  .btn-lg{padding:16px 28px;font-size:16px}

  .btn-row{display:flex;gap:12px;align-items:center;margin-top:36px}
  .btn-row.between{justify-content:space-between}

  /* ---------- Hero ---------- */
  .hero{
    padding:88px 0 32px;display:grid;grid-template-columns:1.4fr 1fr;gap:64px;align-items:center;
  }
  .hero-art{
    aspect-ratio:4/5;background:var(--sage-tint);
    border-radius:var(--radius-card);
    border:1px solid var(--line-soft);
    position:relative;overflow:hidden;
  }
  .hero-art::before{
    content:"";position:absolute;inset:0;
    background:
      repeating-linear-gradient(135deg,transparent 0 22px,rgba(95,116,96,.08) 22px 23px);
  }
  .hero-art-tag{
    position:absolute;left:18px;bottom:18px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:var(--sage-deep);background:var(--paper);
    padding:5px 9px;border-radius:6px;border:1px solid var(--line-soft);
    letter-spacing:.04em;
  }
  .hero-quote{
    position:absolute;inset:auto 24px 80px 24px;
    font-family:'Instrument Serif',serif;font-style:italic;
    font-size:24px;line-height:1.25;color:var(--ink);
    opacity:.85;
  }

  /* ---------- Tile grid ---------- */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
  .tile{
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-card);padding:28px 26px;
    display:flex;flex-direction:column;gap:10px;min-height:180px;
  }
  .tile-num{
    font-family:'Instrument Serif',serif;font-size:32px;color:var(--sage-deep);line-height:1;
  }
  .tile-title{font-weight:600;font-size:16px}
  .tile-text{color:var(--ink-2);font-size:14.5px;line-height:1.5}

  .small-note{color:var(--ink-3);font-size:13px;margin-top:18px;letter-spacing:.01em}

  /* ---------- Question screens ---------- */
  .chip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:24px 0 8px}
  .chip{
    display:flex;align-items:center;gap:14px;
    padding:18px 20px;background:var(--paper);
    border:1px solid var(--line);border-radius:var(--radius-card);
    cursor:pointer;text-align:left;
    transition:all .12s ease;font:inherit;color:var(--ink);
    min-height:64px;
  }
  .chip:hover{border-color:var(--sage);background:var(--paper-2)}
  .chip[data-on="true"]{
    background:var(--sage-tint);border-color:var(--sage-deep);
  }
  .chip-check{
    width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);
    flex-shrink:0;display:grid;place-items:center;
    background:var(--paper);color:transparent;
    font-size:13px;
  }
  .chip[data-on="true"] .chip-check{
    background:var(--sage-deep);border-color:var(--sage-deep);color:#fff;
  }
  .chip-radio{border-radius:999px}
  .chip-radio-dot{
    width:10px;height:10px;border-radius:999px;background:#fff;display:none;
  }
  .chip[data-on="true"] .chip-radio-dot{display:block}
  .chip-text{font-size:15.5px;font-weight:500;letter-spacing:.005em}
  .chip-sub{color:var(--ink-3);font-size:13.5px;font-weight:400;line-height:1.4;margin-top:3px}

  .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:24px 0 8px}
  .opt-card{
    padding:24px 26px;background:var(--paper);
    border:1px solid var(--line);border-radius:var(--radius-card);
    cursor:pointer;text-align:left;transition:all .12s ease;
    font:inherit;color:var(--ink);position:relative;
  }
  .opt-card:hover{border-color:var(--sage);background:var(--paper-2)}
  .opt-card[data-on="true"]{background:var(--sage-tint);border-color:var(--sage-deep);box-shadow:0 0 0 1px var(--sage-deep) inset}
  .opt-letter{
    position:absolute;top:20px;right:20px;
    font-family:'Instrument Serif',serif;font-size:22px;color:var(--sage);
  }
  .opt-card[data-on="true"] .opt-letter{color:var(--sage-deep)}
  .opt-title{font-weight:600;font-size:17px;margin:0 0 4px}
  .opt-desc{color:var(--ink-2);font-size:14px;line-height:1.5}

  .warn{
    padding:12px 16px;background:var(--sand-soft);border:1px solid #E2D2A8;
    border-radius:10px;color:#7A6328;font-size:14px;margin-top:12px;
    display:flex;gap:10px;align-items:flex-start;
  }
  .warn-dot{width:6px;height:6px;border-radius:99px;background:#B8923D;margin-top:8px;flex-shrink:0}

  .selected-count{
    font-size:13px;color:var(--ink-3);letter-spacing:.01em;
    margin-top:8px;
  }

  /* ---------- Result screen ---------- */
  .summary-card{
    background:var(--sage-deep);color:#FCFAF5;
    border-radius:var(--radius-card);
    padding:36px 36px;margin-bottom:36px;
    display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;
  }
  .summary-card .eyebrow{color:var(--sand-soft)}
  .summary-card .eyebrow::before{background:var(--sand-soft)}
  .summary-card h3{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:34px;line-height:1.1;margin:0 0 8px;letter-spacing:-.01em;
  }
  .summary-card p{color:rgba(252,250,245,.85);margin:0;font-size:15.5px;max-width:62ch}
  .summary-mark{
    width:64px;height:64px;border-radius:14px;background:rgba(252,250,245,.12);
    display:grid;place-items:center;
    font-family:'Instrument Serif',serif;font-size:36px;color:#fff;
  }

  .results-head{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:18px}
  .results-head h2{margin:0}
  .results-head .small-note{margin:0;max-width:36ch;text-align:right}

  .pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .pkg{
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-card);padding:28px 26px;
    display:flex;flex-direction:column;gap:14px;
    transition:all .15s ease;
  }
  .pkg.featured{border-color:var(--sage);background:var(--paper);box-shadow:var(--shadow-md)}
  .pkg-rank{
    display:inline-flex;align-items:center;gap:8px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:var(--sage-deep);letter-spacing:.08em;
  }
  .pkg-rank-num{
    width:22px;height:22px;border-radius:6px;background:var(--sage-tint);
    display:grid;place-items:center;color:var(--sage-deep);font-weight:600;
  }
  .pkg h3{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:26px;line-height:1.15;margin:0;letter-spacing:-.005em;
  }
  .pkg-desc{color:var(--ink-2);font-size:14.5px;line-height:1.55}
  .pkg-meta{
    display:grid;grid-template-columns:1fr;gap:8px;margin-top:4px;
    border-top:1px solid var(--line-soft);padding-top:14px;
  }
  .pkg-meta-row{display:flex;justify-content:space-between;gap:10px;font-size:13.5px}
  .pkg-meta-row dt{color:var(--ink-3)}
  .pkg-meta-row dd{margin:0;color:var(--ink);font-weight:500;text-align:right}
  .pkg-why{
    font-size:13.5px;color:var(--ink-2);background:var(--sage-tint);
    border-radius:10px;padding:12px 14px;line-height:1.5;
    border-left:3px solid var(--sage);
  }
  .pkg-why-label{font-weight:600;color:var(--sage-deep);display:block;margin-bottom:3px;font-size:12px;letter-spacing:.06em;text-transform:uppercase}

  .pot-bar{display:flex;align-items:center;gap:8px}
  .pot-pips{display:flex;gap:3px}
  .pot-pip{width:10px;height:6px;border-radius:2px;background:var(--line)}
  .pot-pip.on{background:var(--sage-deep)}
  .pot-text{font-size:12.5px;color:var(--ink-3)}

  .footnote{
    margin-top:36px;padding:18px 22px;
    background:var(--paper-2);border:1px solid var(--line-soft);
    border-radius:10px;color:var(--ink-2);font-size:13.5px;line-height:1.55;
    display:flex;gap:12px;align-items:flex-start;
  }
  .footnote-icon{
    width:22px;height:22px;border-radius:99px;
    background:var(--sand-soft);color:#9A7E36;
    display:grid;place-items:center;flex-shrink:0;
    font-family:'Instrument Serif',serif;font-size:14px;font-style:italic;
  }

  /* ---------- Detail screen ---------- */
  .detail{display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:start}
  .detail-main h1{margin-bottom:8px}
  .detail-tagline{color:var(--ink-2);font-size:18px;line-height:1.55;margin:0 0 32px;max-width:62ch}
  .detail-section{margin-bottom:32px}
  .detail-section h4{
    font-size:13px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--sage-deep);font-weight:600;margin:0 0 12px;
  }
  .detail-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
  .detail-list li{
    padding:14px 16px;background:var(--paper);
    border:1px solid var(--line-soft);border-radius:10px;
    font-size:15px;color:var(--ink);
    display:flex;gap:12px;align-items:flex-start;
  }
  .detail-list li::before{
    content:"";width:6px;height:6px;border-radius:99px;
    background:var(--sage);margin-top:9px;flex-shrink:0;
  }
  .detail-side{
    position:sticky;top:90px;
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-card);padding:28px;
  }
  .side-row{padding:14px 0;border-top:1px solid var(--line-soft);font-size:14px;display:flex;justify-content:space-between;gap:10px}
  .side-row:first-of-type{border-top:0;padding-top:0}
  .side-row dt{color:var(--ink-3)}
  .side-row dd{margin:0;font-weight:500;text-align:right}
  .test-box{
    background:var(--sage-tint);padding:18px 20px;border-radius:10px;
    margin-top:20px;
  }
  .test-box-label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--sage-deep);font-weight:600}
  .test-box p{margin:6px 0 0;font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;line-height:1.4;color:var(--ink)}

  /* ---------- Next-step screen ---------- */
  .next-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px}
  .next-card{
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-card);padding:32px 28px;
    display:flex;flex-direction:column;gap:14px;min-height:240px;
    transition:all .15s ease;
  }
  .next-card.recommended{
    background:var(--sage-tint);border-color:var(--sage);
    box-shadow:var(--shadow-md);
  }
  .next-card .badge{
    display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
    background:var(--sage-deep);color:#fff;font-size:11px;
    padding:5px 10px;border-radius:99px;
    letter-spacing:.08em;text-transform:uppercase;font-weight:600;
  }
  .next-card h3{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:24px;line-height:1.15;margin:6px 0 0;
  }
  .next-card p{color:var(--ink-2);font-size:14.5px;line-height:1.55;flex:1;margin:0}
  .next-card .btn{align-self:flex-start;margin-top:8px}

  /* ---------- Form screen ---------- */
  .form-shell{
    display:grid;grid-template-columns:1fr 320px;gap:48px;align-items:start;
  }
  .form-fields{display:flex;flex-direction:column;gap:22px}
  .field{display:flex;flex-direction:column;gap:8px}
  .field label{font-size:13.5px;font-weight:600;color:var(--ink);letter-spacing:.005em}
  .field .hint{font-size:13px;color:var(--ink-3);margin-top:-4px}
  .field input[type="text"],.field input[type="email"],.field input[type="tel"],
  .field textarea,.field select{
    font:inherit;font-size:15px;
    padding:12px 14px;border-radius:10px;
    background:var(--paper);border:1px solid var(--line);
    color:var(--ink);transition:border-color .12s;
    width:100%;font-family:inherit;
  }
  .field textarea{min-height:90px;resize:vertical;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{
    outline:none;border-color:var(--sage-deep);
    box-shadow:0 0 0 3px rgba(95,116,96,.12);
  }
  .seg{
    display:inline-flex;background:var(--paper-2);border:1px solid var(--line-soft);
    border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap;
  }
  .seg button{
    font:inherit;font-size:14px;padding:9px 14px;border-radius:8px;
    background:transparent;border:0;cursor:pointer;color:var(--ink-2);
  }
  .seg button[data-on="true"]{background:var(--paper);color:var(--ink);box-shadow:var(--shadow-sm)}
  .seg button:hover:not([data-on="true"]){color:var(--ink)}

  .check-line{
    display:flex;align-items:center;gap:10px;font-size:14.5px;color:var(--ink-2);
    margin-top:6px;cursor:pointer;
  }
  .check-line input{accent-color:var(--sage-deep);width:16px;height:16px}

  .info-box{
    background:var(--sand-soft);border:1px solid #E2D2A8;
    border-radius:10px;padding:14px 16px;
    color:#6B5728;font-size:13.5px;line-height:1.55;
  }
  .info-box strong{color:#5A4920;font-weight:600}

  .form-side{
    background:var(--paper);border:1px solid var(--line-soft);
    border-radius:var(--radius-card);padding:24px;
    position:sticky;top:90px;
  }
  .form-side h5{
    font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--sage-deep);margin:0 0 10px;font-weight:600;
  }
  .form-side .pkg-name{
    font-family:'Instrument Serif',serif;font-size:22px;line-height:1.15;margin:0 0 8px;
  }

  if (topics.includes("bne"))        { s.bne+=3; s.kreativ+=1; }
  if (topics.includes("wissen"))     { s.wissen+=3; s.begegnung+=1; }
  if (topics.includes("entlasten"))  { s.begegnung+=2; s.wissen+=1; }
  if (topics.includes("unsicher"))   { s.begegnung+=2; s.wissen+=2; }

  // Q2 — existing items are deprioritised (already covered); adjacent packages gain
  if (existing.includes("vorlesen")) { s.geschichten-=2; s.begegnung+=1; s.kreativ+=1; }
  if (existing.includes("spiel"))    { s.begegnung-=2; s.wissen+=1; s.kreativ+=1; }
  if (existing.includes("kreativ"))  { s.kreativ-=2; s.bne+=1; s.wissen+=1; }
  if (existing.includes("digital"))  { s.digital-=2; s.wissen+=1; }
  if (existing.includes("bne"))      { s.bne-=2; s.kreativ+=1; s.wissen+=1; }
  if (existing.includes("lese"))     { s.geschichten-=1; s.begegnung+=1; }
  if (existing.includes("extern"))   { s.begegnung+=1; s.wissen+=2; }
  if (existing.includes("wenig"))    { s.begegnung+=2; s.wissen+=2; }

  // Q3
  if (coord==="A"){ s.begegnung+=2; s.wissen+=2; s.kreativ+=1; s.bne-=2; s.geschichten-=1; s.digital-=1; }
  if (coord==="B"){ s.begegnung+=1; s.geschichten+=1; s.kreativ+=1; s.wissen+=1; }
  if (coord==="C"){ s.digital+=1; s.geschichten+=1; s.kreativ+=1; s.bne+=1; }
  if (coord==="D"){ s.bne+=2; s.kreativ+=2; s.digital+=1; }

  // Q4
  if (targets.includes("kinder"))    { s.geschichten+=3; s.kreativ+=1; }
  if (targets.includes("jugend"))    { s.digital+=1; s.bne+=1; s.wissen+=1; }
  if (targets.includes("alt"))       { s.digital+=2; s.begegnung+=2; s.wissen+=1; }
  if (targets.includes("unsicher"))  { s.digital+=3; }
  if (targets.includes("quartier"))  { s.begegnung+=3; s.bne+=1; }
  if (targets.includes("generation")){ s.begegnung+=2; s.wissen+=2; s.kreativ+=1; }
  if (targets.includes("offen"))     { s.begegnung+=2; s.wissen+=2; }

  // Sort by score, then lower effort, then prioritise begegnung
  const arr = Object.entries(s).map(([id,score])=>({
    id, score, effort: PACKAGES[id].effortLevel,
  }));
  arr.sort((a,b)=>{
    if (b.score !== a.score) return b.score - a.score;
    if (a.effort !== b.effort) return a.effort - b.effort;
    if (a.id === "begegnung") return -1;
    if (b.id === "begegnung") return 1;
    return 0;
  });
  return arr.slice(0,3).map(x=>({ ...PACKAGES[x.id], score:x.score }));
}

  if (!state.customOffer || !state.slot) return null;
  return { name: state.slot.customThema || state.slot.title || "Eigenes Angebot", short: state.slot.desc || "", effort:"—", roles:[], id:"custom" };
}

function scoreRoles({motivations=[], competences=[], commit="", contexts=[]}){
  const scored = ROLES.map(r => {
    let score = 0;
    motivations.forEach(m => { if (r.fit.motivations.includes(m)) score += 3; });
    competences.forEach(c => { if (r.fit.competences.includes(c)) score += 2; });
    contexts.forEach(c => { if (r.fit.contexts.includes(c)) score += 2; });
    if (commit && r.fit.commits.includes(commit)) score += 4;
    if (motivations.includes("unklar") && (r.fit.commits.includes("A") || r.fit.commits.includes("B"))){
      score += 2;
    }
    return { ...r, _score: score };
  });
  scored.sort((a,b)=>b._score - a._score);
  return scored.slice(0,3);
}

  const pct = Math.max(0, Math.min(100, (step/total)*100));
  return (
    <div className="progress">
      <span className="progress-label mono">Frage {step} von {total}</span>
      <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
      <span className="progress-label">ca. 5–7 Minuten</span>
    </div>
  );
}

/* ============================================================

   ============================================================ */
function Q1({ state, set, go }){
  const [warn,setWarn] = useState(false);
  const sel = state.topics;
  function toggle(id){
    if (sel.includes(id)) {
      set({ topics: sel.filter(x=>x!==id) });
      setWarn(false);
    } else {
      if (sel.length >= 3) { setWarn(true); return; }
      set({ topics: [...sel, id] });
      setWarn(false);
    }
  }
  return (
    <QuestionShell
      step={1}
      title="Was möchten Sie als Nächstes ermöglichen?"
      sub="Wählen Sie bis zu 3 Themen, die für Ihre Bibliothek aktuell wichtig sind."
      onBack={()=>go("start")}
      onNext={()=>go("q2")}
      nextDisabled={sel.length===0}
    >
      {warn && (
        <div className="warn">
          <span className="warn-dot"/>
          <span>Für den Start empfehlen wir Fokus. Bitte wählen Sie maximal 3 Themen.</span>
        </div>
      )}
      <div className="chip-grid">
        {TOPICS.map(t=>(
          <button key={t.id} className="chip" data-on={sel.includes(t.id)} onClick={()=>toggle(t.id)}>
            <span className="chip-check">✓</span>
            <span className="chip-text">{t.label}</span>
          </button>
        ))}
      </div>
      <div className="selected-count mono">{sel.length} von max. 3 ausgewählt</div>
    </QuestionShell>
  );
}

/* ============================================================
   SCREEN: EIGENES ANGEBOT FORM (Bibliothek legt direkt an)
   ============================================================ */
function EigenesAngebotForm({ state, set, go }){
  const [f,setF] = useState({
    thema:"",
    title:"",
    type:"Schnuppern",
    when:"",
    flexible:false,
    seats:"2",
    desc:"",
    role:"",
    library:"Raum, Anmeldung, Material, Ansprechperson, Ablauf",
    seek:"",
    contactName:"",
    contactEmail:"",
  });
  function upd(k,v){ setF({...f,[k]:v}); }
  function publish(){
    if (!f.title||!f.contactName||!f.contactEmail) return;
    const slot = { ...f, pkgId:null, customThema:f.thema, id:"slot-"+Date.now(), created:new Date(), registrations:[] };
    set({ slot, slots:[slot], pilotPkg:null, customOffer:true });
    go("publishConfirm");
  }
  const valid = f.title && f.contactName && f.contactEmail;

  return (
    <div className="container fade-in">
      <button className="btn btn-ghost" style={{marginBottom:18,marginLeft:-12}} onClick={()=>go("start")}>← Zurück</button>
      <span className="eyebrow">Eigenes Angebot</span>
      <h1 className="display" style={{fontSize:"clamp(34px,4vw,48px)"}}>Angebot direkt anlegen</h1>
      <p className="lede">Sie wissen bereits, was Sie ermöglichen möchten – ohne Umweg über den Paket-Finder.</p>

      <div className="form-shell">
        <div className="form-fields">

          <div className="field">
            <label>Thema oder Bereich <span style={{color:"var(--ink-3)",fontWeight:400}}>– optional</span></label>
            <input type="text" value={f.thema} onChange={e=>upd("thema",e.target.value)}
                   placeholder="z. B. Nähgruppe, Sprachcafé, Gartenworkshop, Erzählcafé" />
            <span className="hint">Hilft Engagierten bei der ersten Einordnung.</span>
          </div>

          <div className="field">
            <label>Titel des Angebots</label>
            <input type="text" value={f.title} onChange={e=>upd("title",e.target.value)}
                   placeholder="z. B. Nähgruppe – erster Schnuppertermin" />
          </div>

          <div className="field">
            <label>Art des Mitmachens</label>
            <div className="seg">
              {["Schnuppern","Einmalig mitmachen","Interesse bekunden"].map(t=>(
                <button key={t} data-on={f.type===t} onClick={()=>upd("type",t)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Datum / Zeitraum</label>
            <input type="text" value={f.when} disabled={f.flexible} onChange={e=>upd("when",e.target.value)}
                   placeholder="z. B. 12. März, 18:00–20:30 Uhr" />
            <label className="check-line">
              <input type="checkbox" checked={f.flexible} onChange={e=>upd("flexible",e.target.checked)} />
              Termin wird gemeinsam gefunden
            </label>
          </div>

          <div className="field">
            <label>Anzahl Plätze</label>
            <div className="seg">
              {["1","2","3–4","unbegrenzt"].map(s=>(
                <button key={s} data-on={f.seats===s} onClick={()=>upd("seats",s)}>{s}</button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Was soll passieren?</label>
            <textarea value={f.desc} onChange={e=>upd("desc",e.target.value)}
                      placeholder="Kurze Beschreibung für die öffentliche Seite – was erwartet die Mitmachenden?" />
          </div>

          <div className="field">
            <label>Aufgabe der Mitmachenden</label>
            <textarea value={f.role} onChange={e=>upd("role",e.target.value)}
                      placeholder="Was übernehmen die Engagierten konkret?" />
          </div>

          <div className="field">
            <label>Was übernimmt die Bibliothek?</label>
            <textarea value={f.library} onChange={e=>upd("library",e.target.value)}
                      placeholder="z. B. Raum, Anmeldung, Material, Ansprechperson, Ablauf" />
          </div>

          <div className="field">
            <label>Wen suchen wir?</label>
            <textarea value={f.seek} onChange={e=>upd("seek",e.target.value)}
                      placeholder="z. B. Menschen mit Freude am Nähen, Geduld mit Anfängerinnen" />
          </div>

          <div className="field">
            <label>Kontaktperson – Name</label>
            <input type="text" value={f.contactName} onChange={e=>upd("contactName",e.target.value)}
                   placeholder="z. B. Anna Hoffmann" />
          </div>
          <div className="field">
            <label>Kontaktperson – E-Mail</label>
            <input type="email" value={f.contactEmail} onChange={e=>upd("contactEmail",e.target.value)}
                   placeholder="anna.hoffmann@bibliothek-musterstadt.de" />
          </div>

          <div className="info-box">
            <strong>Unverbindlich bedeutet:</strong> keine langfristige Verpflichtung.
            Für den gewählten Termin bitten wir um kurze Absage, falls jemand doch nicht kommen kann.
          </div>

          <div className="btn-row between">
            <button className="btn btn-ghost" onClick={()=>go("start")}>← Zurück</button>

          </p>
        </aside>
      </div>
    </div>
  );
}

function AufrufScreen({ state, go }){
  const p = getCustomPkg(state) || PACKAGES[state.pilotPkg] || (state.selectedPkg ? PACKAGES[state.selectedPkg] : PACKAGES.begegnung);
  const slot = state.slot;
  const hasSlot = !!slot;
  const [mode,setMode] = useState(hasSlot ? "konkret" : "allgemein");
  const [channel,setChannel] = useState("aushang");
  const [copied,setCopied] = useState(false);

  // Build texts
  const texts = useMemo(()=>{
    const lib = "Stadtbibliothek Musterstadt";
    const contact = slot?.contactEmail || "mitmachen@bibliothek-musterstadt.de";
    const when = slot ? (slot.flexible ? "Termin wird gemeinsam gefunden" : slot.when) : "—";

    if (mode === "allgemein") {
      // No slot yet — generic "we are a Mitmach-Ort" call
      return {
        aushang:
`Wir sind Mitmach-Ort.

Die ${lib} öffnet sich für Menschen ab 55,
die mit ihrer Erfahrung, Geduld oder Neugier
einen Beitrag leisten möchten.

Aktuell denken wir über folgendes Thema nach:
${p.name}.

${p.short}

Sie müssen sich nicht festlegen.
Schauen Sie vorbei, sprechen Sie uns an, lernen Sie uns kennen.

Kontakt: ${contact}`,

        newsletter:
`Liebe Leserinnen und Leser,

unsere Bibliothek möchte ein Ort werden, an dem Menschen ab 55 mitmachen können – mit ihrer Zeit, ihrem Wissen oder einfach mit Freude an Begegnung.

Als nächsten Schritt beschäftigen wir uns mit dem Thema „${p.name}".
${p.short}

Wenn Sie das anspricht: Wir freuen uns, Sie kennenzulernen. Ein konkreter Termin entsteht in den nächsten Wochen – Sie können sich vormerken lassen.

Antworten Sie einfach auf diese E-Mail oder schreiben Sie an ${contact}.

Herzliche Grüße
Ihre ${lib}`,

        amtsblatt:
`${lib} sucht Mitmachende ab 55

Die ${lib} entwickelt sich zu einem Mitmach-Ort. Im Mittelpunkt stehen kleine, niedrigschwellige Formate, bei denen Menschen ab 55 mit Erfahrung, Zeit oder Interesse beitragen können – ohne langfristige Verpflichtung.

Aktueller Schwerpunkt: ${p.name}. ${p.short}

Interessierte können sich unverbindlich melden unter ${contact}.`,
      };
    }

    // Concrete mode — slot exists
    return {
      aushang:
`Mitmachen statt zuschauen.

${slot.title}
${when}
${lib}

Was passiert?
${slot.desc}

Was übernehmen Sie?
${slot.role || "Wird gemeinsam besprochen."}

Was übernimmt die Bibliothek?
${slot.library}

Gut geeignet, wenn Sie ${slot.seek?.toLowerCase().replace(/^./, c=>c) || "Freude an Begegnung haben"}.

Mit Ihrer Anmeldung übernehmen Sie keine
langfristige Verpflichtung.

Kontakt: ${slot.contactName || ""} · ${contact}`,

      newsletter:
`Liebe Leserinnen und Leser,

wir möchten Sie zu einem konkreten Mitmach-Termin in unserer Bibliothek einladen:

„${slot.title}"
${when}, ${lib}

${slot.desc}

Ihre Rolle: ${slot.role || "Beim ersten Termin gemeinsam besprochen."}
Wir kümmern uns um: ${slot.library}.

Sie übernehmen mit der Anmeldung keine langfristige Verpflichtung – es geht um einen ersten Eindruck und ein gutes Gespräch.

Anmeldung und Rückfragen: ${contact}

Herzliche Grüße
Ihre ${lib}`,

      amtsblatt:
`${lib}: Mitmachen am ${when.split(",")[0] || when}

Unter dem Titel „${slot.title}" lädt die ${lib} Menschen ab 55 ein, ${slot.type.toLowerCase()}. ${slot.desc}

Termin: ${when}. Plätze: ${slot.seats}. Eine Anmeldung ist erwünscht, aber nicht verbindlich.

Kontakt: ${contact}.`,
    };
  },[mode, channel, p, slot]);

  const channels = [
    { id:"aushang",    label:"Aushang / Plakat" },
    { id:"newsletter", label:"Newsletter / E-Mail" },
    { id:"amtsblatt",  label:"Amtsblatt / Presse" },
  ];
  const text = texts[channel];

  function copy(){
    navigator.clipboard?.writeText(text).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1800);
    });
  }

  return (
    <div className="container fade-in">
      <button className="btn btn-ghost" style={{marginBottom:18,marginLeft:-12}} onClick={()=>go("next")}>← Zurück</button>
      <span className="eyebrow">Aktivierungsaufruf</span>
      <h1 className="display" style={{fontSize:"clamp(34px,4vw,48px)"}}>
        {mode==="allgemein" ? '„Wir sind Mitmach-Ort"' : "Aufruf zu Ihrem Mitmach-Termin"}
      </h1>
      <p className="lede">
        {mode==="allgemein"
          ? <>Ein erster Aufruf ist auch schon ohne konkreten Slot möglich. Sie machen sichtbar, dass Ihre Bibliothek Engagierte mit Erfahrung einlädt – das Thema ist klar, der Termin entsteht später.</>
          : <>Mit den Daten Ihres Mitmach-Termins <strong>„{slot?.title}"</strong> vorausgefüllt. Wählen Sie einen Kanal, kopieren Sie den Text, passen Sie ihn an.</>}
      </p>

      {hasSlot && (
        <div className="seg" style={{marginBottom:24}}>
          <button data-on={mode==="allgemein"} onClick={()=>setMode("allgemein")}>Allgemeiner Aufruf</button>

        </div>
      )}

      {!hasSlot && (
        <div className="footnote" style={{marginBottom:24}}>
          <span className="footnote-icon">i</span>
          <span>
            Sobald Sie einen Mitmach-Termin erstellt haben, können Sie hier auch einen konkreten
            Aufruf mit Termin, Rolle und Anmeldelink generieren.
            <button className="btn btn-ghost" style={{padding:"2px 10px",marginLeft:8,fontSize:13}} onClick={()=>go("slotForm")}>Termin anlegen →</button>
          </span>
        </div>
      )}

      <div className="form-shell">
        <div>
          <div className="seg" style={{marginBottom:14}}>
            {channels.map(c=>(
              <button key={c.id} data-on={channel===c.id} onClick={()=>setChannel(c.id)}>{c.label}</button>
            ))}
          </div>

          <div style={{
            background:"var(--paper)",
            border:"1px solid var(--line-soft)",
            borderRadius:"var(--radius-card)",
            padding:"32px 36px",
            fontFamily:"'Instrument Serif',Georgia,serif",
            fontSize:18,
            lineHeight:1.6,
            color:"var(--ink)",
            whiteSpace:"pre-wrap",
            minHeight:360,
          }}>{text}</div>

          <div className="btn-row">
            <button className="btn btn-primary" onClick={copy}>
              {copied ? "✓ Kopiert" : "Text kopieren"}
            </button>
            <button className="btn btn-secondary" onClick={()=>window.print()}>Drucken / als PDF</button>
            {!hasSlot && <button className="btn btn-ghost" onClick={()=>go("slotForm")}>Mitmach-Termin anlegen →</button>}
          </div>
        </div>

        <aside className="form-side">
          <h5>Was Sie versenden</h5>
          <p className="pkg-name" style={{fontSize:20}}>{channels.find(c=>c.id===channel).label}</p>
          <p className="pkg-desc">
            {channel==="aushang"   && "Kurz, ruhig, mit großem Titel. Geeignet für Eingangsbereich, Schwarzes Brett, Schaufenster."}
            {channel==="newsletter"&& "Ansprache wie ein Brief – persönlich, mit klarer Einladung und Kontakt."}
            {channel==="amtsblatt" && "Sachlich, knapp, ein Absatz. Für lokale Presse und Amtsblatt."}
          </p>
          <dl style={{margin:0}}>
            <div className="side-row"><dt>Paket</dt><dd>{p.name}</dd></div>
            <div className="side-row"><dt>Modus</dt><dd>{mode==="allgemein"?"Allgemein":"Konkret"}</dd></div>
            {hasSlot && mode==="konkret" && <div className="side-row"><dt>Slot</dt><dd style={{maxWidth:180}}>{slot.title}</dd></div>}
          </dl>
          <p className="micro">
            Tipp: Drei Kanäle gleichzeitig zu bespielen erhöht die Chance, dass jemand Engagiertes den Aufruf sieht – Aushang vor Ort, Newsletter an Stammleser:innen, Amtsblatt für die Breite.
          </p>
        </aside>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN: SLOT FORM
   ============================================================ */
function SlotForm({ state, set, go }){
  const p = PACKAGES[state.pilotPkg] || PACKAGES.begegnung;
  const [f,setF] = useState(state.slot || {
    title: p.id==="begegnung" ? "Spieleabend-Gastgeber:in schnuppern" : `${p.name} – Schnuppertermin`,
    type:"Schnuppern",
    when:"12. März, 18:00–20:30 Uhr",
    flexible:false,
    seats:"2",
    desc: p.formats[0],
    role:"",
    library:"Raum, Anmeldung, Material, Ansprechperson, Ablauf",
    seek:"Menschen mit Freude an Begegnung, Geduld und einer ruhigen Hand",
    contactName:"",
    contactEmail:"",
  });
  function upd(k,v){ setF({...f,[k]:v}); }
  function publish(){
    if (!f.title || !f.contactName || !f.contactEmail) return;
    const slot = { ...f, pkgId:p.id, id:"slot-"+Date.now(), created:new Date(), registrations:[] };
    set({ slot, slots:[slot] });
    go("publishConfirm");
  }
  const valid = f.title && f.contactName && f.contactEmail;

  return (
    <div className="container fade-in">
      <button className="btn btn-ghost" style={{marginBottom:18,marginLeft:-12}} onClick={()=>go("next")}>← Zurück</button>
      <span className="eyebrow">Mitmach-Termin</span>
      <h1 className="display" style={{fontSize:"clamp(34px,4vw,48px)"}}>Mitmach-Termin anlegen</h1>
      <p className="lede">Machen Sie aus dem Paket einen konkreten, niedrigschwelligen Einstieg.</p>

      <div className="form-shell">
        <div className="form-fields">

          <div className="field">
            <label>Titel des Slots</label>
            <input type="text" value={f.title} onChange={e=>upd("title",e.target.value)}
                   placeholder="z. B. Spieleabend-Gastgeber:in schnuppern" />
          </div>

          <div className="field">
            <label>Paket</label>
            <input type="text" value={p.name} disabled style={{opacity:.7}} />
            <span className="hint">Wird automatisch aus Ihrer Auswahl übernommen.</span>
          </div>

          <div className="field">
            <label>Art des Mitmachens</label>
            <div className="seg">
              {["Schnuppern","Einmalig mitmachen","Interesse bekunden"].map(t=>(
                <button key={t} data-on={f.type===t} onClick={()=>upd("type",t)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Datum / Zeitraum</label>
            <input type="text" value={f.when} disabled={f.flexible} onChange={e=>upd("when",e.target.value)}
                   placeholder="z. B. 12. März, 18:00–20:30 Uhr" />
            <label className="check-line">
              <input type="checkbox" checked={f.flexible} onChange={e=>upd("flexible",e.target.checked)} />
              Termin wird gemeinsam gefunden
            </label>
          </div>

          <div className="field">
            <label>Anzahl Plätze</label>
            <div className="seg">
              {["1","2","3–4","unbegrenzt"].map(s=>(
                <button key={s} data-on={f.seats===s} onClick={()=>upd("seats",s)}>{s}</button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Kurzbeschreibung</label>
            <textarea value={f.desc} onChange={e=>upd("desc",e.target.value)} placeholder="Was passiert bei diesem Mitmach-Termin?"/>
          </div>

          <div className="field">
            <label>Aufgabe der Mitmachenden</label>
            <textarea value={f.role} onChange={e=>upd("role",e.target.value)} placeholder="Was übernehmen die Engagierten konkret?"/>
          </div>

          <div className="field">
            <label>Was übernimmt die Bibliothek?</label>
            <textarea value={f.library} onChange={e=>upd("library",e.target.value)} placeholder="z. B. Raum, Anmeldung, Material, Ansprechperson, Ablauf"/>
          </div>

          <div className="field">
            <label>Wen suchen wir?</label>
            <textarea value={f.seek} onChange={e=>upd("seek",e.target.value)} placeholder="z. B. Menschen mit Freude an Begegnung, Geduld, Kreativität oder Erfahrung"/>
          </div>

          <div className="field">
            <label>Kontaktperson – Name</label>
            <input type="text" value={f.contactName} onChange={e=>upd("contactName",e.target.value)} placeholder="z. B. Anna Hoffmann"/>
          </div>
          <div className="field">
            <label>Kontaktperson – E-Mail</label>
            <input type="email" value={f.contactEmail} onChange={e=>upd("contactEmail",e.target.value)} placeholder="anna.hoffmann@bibliothek-musterstadt.de"/>
          </div>

          <div className="info-box">
            <strong>Unverbindlich bedeutet:</strong> keine langfristige Verpflichtung. Für den gewählten
            Termin bitten wir um kurze Absage, falls jemand doch nicht kommen kann.
          </div>

          <div className="btn-row between">
            <button className="btn btn-ghost" onClick={()=>go("next")}>← Zurück</button>
            <button className="btn btn-primary btn-lg" disabled={!valid} onClick={publish}>
              Mitmach-Termin veröffentlichen →
            </button>
          </div>
        </div>

        <aside className="form-side">
          <h5>Pilot-Paket</h5>
          <p className="pkg-name">{p.name}</p>
          <p className="pkg-desc">{p.short}</p>
          <dl style={{margin:0}}>
            <div className="side-row"><dt>Aufwand</dt><dd>{p.effort}</dd></div>
            <div className="side-row"><dt>Engagementstufe</dt><dd>{p.stage}</dd></div>
          </dl>
          <p className="micro">
            Veröffentlichen erzeugt eine öffentliche Mitmach-Seite und legt den Slot im Backend an.
          </p>
        </aside>
      </div>
    </div>
  );
}

    { id:"web",        label:"Bibliotheks-Webseite",       icon:"🌐" },

        <h2 className="section">Noch kein Mitmach-Termin ausgewählt</h2>

              <span>stadtbibliothek-musterstadt.de</span>

          <button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:13}} onClick={()=>go(isDemo ? "portal" : "dashboard")}>
            {isDemo ? "← Zurück zum Portal" : "← Zur Verwaltung"}

      </div>

      <article className="slot-public">
        <header className="head">
          <span className="eyebrow">Mitmachen · {einrichtung}</span>
          <h1 className="display">{slot.title}</h1>
          <div className="where">
            <span><strong>{slot.flexible ? "Termin wird gemeinsam gefunden" : slot.when}</strong></span>
            <span>{einrichtung}</span>

          <dl className="slot-fact-grid">
            <div className="slot-fact">
              <dt>Freie Plätze</dt>
              <dd className="mono">{free}</dd>
            </div>
            <div className="slot-fact">
              <dt>Verbindlichkeit</dt>

            </div>
            <div className="slot-fact">

              <dd>{p.name}</dd>

            <h4>Worum geht es?</h4>
            <p>{slot.desc}</p>
          </div>
          <div className="slot-block">
            <h4>Ihre Rolle</h4>
            <p>{slot.role || "Wird beim ersten Termin gemeinsam besprochen."}</p>
          </div>
          <div className="slot-block">
            <h4>Die Bibliothek übernimmt</h4>
            <p>{slot.library}</p>
          </div>
          <div className="slot-block">
            <h4>Gut geeignet, wenn Sie…</h4>
            <p>{slot.seek}</p>

          <div className="commitment-note">
            Mit Ihrer Anmeldung übernehmen Sie keine langfristige Verpflichtung.

        <div className="cta-row">
          <button className="btn btn-primary btn-lg" onClick={()=>go("register")}>Ich mache unverbindlich mit</button>

function parseSeats(s){
  if (s==="1") return 1;
  if (s==="2") return 2;
  if (s==="3–4") return 4;
  return 99;
}

/* ============================================================
   SCREEN: REGISTRATION
   ============================================================ */
function RegisterScreen({ state, set, go }){
  const slot = state.slot;
  const [f,setF] = useState({
    first:"", last:"", email:"", phone:"",
    wish:"erst einmal schnuppern",
    note:"",
    consent:false,
  });
  const [done,setDone] = useState(false);

  function upd(k,v){ setF({...f,[k]:v}); }
  function submit(){
    if (!f.first||!f.last||!f.email||!f.consent) return;
    const reg = {
      id:"reg-"+Date.now(),
      slotId: slot?.id,
      slotTitle: slot?.title,
      pkgId: slot?.pkgId,
      first:f.first, last:f.last, email:f.email, phone:f.phone,
      wish:f.wish, note:f.note,
      status:"neu",
      created:new Date(),
    };
    const slots = (state.slots||[]).map(s => s.id===slot.id
      ? {...s, registrations:[...s.registrations, reg]} : s);
    set({
      slot: slots.find(s=>s.id===slot.id),
      slots,
      registrations: [...(state.registrations||[]), reg]
    });
    setDone(true);
  }

  if (done) {
    return (
      <div className="public-shell fade-in">
        <div className="public-bar">
          <div className="breadcrumb"><span>stadtbibliothek-musterstadt.de</span><span>›</span><span>Mitmachen</span><span>›</span><span>Bestätigung</span></div>
        </div>
        <div className="confirm-card">
          <div className="confirm-mark">✓</div>
          <h2 className="section">Vielen Dank, {f.first}.</h2>
          <p>Ihre Interessensbekundung wurde gesendet. Die Bibliothek oder SISU meldet sich
             bei Ihnen. Sie übernehmen noch keine langfristige Verpflichtung.</p>
          <div className="btn-row" style={{justifyContent:"center"}}>
            <button className="btn btn-secondary" onClick={()=>go("public")}>Zurück zur Slot-Seite</button>
            <button className="btn btn-ghost" onClick={()=>go("dashboard")}>So sieht die Bibliothek das ↗</button>
          </div>
        </div>
      </div>
    );
  }

  const valid = f.first && f.last && f.email && f.consent;

  return (
    <div className="public-shell fade-in">
      <div className="public-bar">
        <div className="breadcrumb"><span>stadtbibliothek-musterstadt.de</span><span>›</span><span>Mitmachen</span><span>›</span><span>Anmeldung</span></div>
        <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={()=>go("public")}>← Zurück</button>
      </div>
      <article className="slot-public" style={{maxWidth:680}}>
        <header className="head">
          <span className="eyebrow">Anmeldung</span>
          <h1 className="display">Schön, dass Sie mitmachen möchten.</h1>
          <p style={{margin:"8px 0 0",color:"var(--ink-2)",fontSize:15.5}}>
            Slot: <strong>{slot?.title || "—"}</strong> · {slot?.flexible ? "Termin wird gemeinsam gefunden" : slot?.when}
          </p>
        </header>
        <div className="body">
          <div className="form-fields">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div className="field"><label>Vorname</label><input value={f.first} onChange={e=>upd("first",e.target.value)} /></div>
              <div className="field"><label>Nachname</label><input value={f.last} onChange={e=>upd("last",e.target.value)} /></div>
            </div>
            <div className="field"><label>E-Mail</label><input type="email" value={f.email} onChange={e=>upd("email",e.target.value)} /></div>
            <div className="field"><label>Telefon <span style={{color:"var(--ink-3)",fontWeight:400}}>– optional</span></label><input type="tel" value={f.phone} onChange={e=>upd("phone",e.target.value)} /></div>

            <div className="field">
              <label>Ich möchte</label>
              <div className="seg" style={{flexWrap:"wrap"}}>
                {["erst einmal schnuppern","einmalig mitmachen","gerne mehr erfahren","mir regelmäßiges Mitmachen vorstellen"].map(o=>(
                  <button key={o} data-on={f.wish===o} onClick={()=>upd("wish",o)}>{o}</button>
                ))}
              </div>
            </div>

            <div className="field">
              <label>Nachricht <span style={{color:"var(--ink-3)",fontWeight:400}}>– optional</span></label>
              <textarea value={f.note} onChange={e=>upd("note",e.target.value)} placeholder="Gibt es etwas, das wir wissen sollten?"/>
            </div>

            <label className="check-line" style={{alignItems:"flex-start",gap:12,marginTop:6}}>
              <input type="checkbox" checked={f.consent} onChange={e=>upd("consent",e.target.checked)} style={{marginTop:3}}/>
              <span>Ich bin einverstanden, dass meine Angaben zur Kontaktaufnahme für diesen Mitmach-Termin gespeichert werden.</span>
            </label>

            <div className="btn-row">
              <button className="btn btn-primary btn-lg" disabled={!valid} onClick={submit}>Interesse senden →</button>
              <button className="btn btn-ghost" onClick={()=>go("public")}>Abbrechen</button>
            </div>
          </div>
        </div>
      </article>
    </div>
  );
}

function Dashboard({ state, set, go }){
  const [tab,setTab] = useState(state.dashboardTab || "pakete");
  useEffect(()=>{ if (state.dashboardTab) set({ dashboardTab: null }); },[]);
  const slots = state.slots || [];
  const regs = state.registrations || [];
  const pilot = state.pilotPkg ? PACKAGES[state.pilotPkg] : getCustomPkg(state);

  function setStatus(regId, status){
    const newRegs = regs.map(r => r.id===regId ? {...r, status} : r);
    set({ registrations: newRegs,
          slots: slots.map(s=>({...s, registrations:s.registrations.map(r=>r.id===regId?{...r,status}:r)}))});
  }

  return (
    <div className="container wide fade-in">
      <div className="dash-head">

          </div>
        </div>
        <div style={{display:"flex",gap:8}}>

          Mitmach-Termine <span className="count">{slots.length}</span>

        <button className="dash-tab" data-on={tab==="anm"} onClick={()=>setTab("anm")}>
          Anmeldungen <span className="count">{regs.length}</span>

        <button className="dash-tab" data-on={tab==="ideen"} onClick={()=>setTab("ideen")}>
          Ideen aus der Stadt <span className="count">{(state.ideas||[]).length}</span>
        </button>
        <button className="dash-tab" data-on={tab==="status"} onClick={()=>setTab("status")}>
          Status
        </button>
      </div>

      {tab==="pakete" && (
        <div className="dash-card">
          <h3>{state.customOffer ? "Eigenes Angebot" : "Gewähltes Paket"}</h3>
          <div className="sub">{state.customOffer ? "Ein direkt angelegtes Angebot – ohne Paket-Finder." : "Das aktuelle Pilot-Paket Ihrer Bibliothek."}</div>
          {pilot ? (
            <table className="dash">
              <thead><tr><th>{state.customOffer?"Angebot":"Paket"}</th><th>Bibliothek</th><th>Aufwand</th><th>Status</th><th>Aktion</th></tr></thead>
              <tbody>
                <tr>
                  <td><strong>{pilot.name}</strong><br/><span style={{color:"var(--ink-3)",fontSize:13}}>{(pilot.short||"").slice(0,80)}{pilot.short?.length>80?"…":""}</span></td>

                  <td>{pilot.effort}</td>
                  <td><span className="pill ok">{state.customOffer?"Eigenes Angebot":"Paket ausgewählt"}</span></td>
                  <td><div className="row-actions">
                    {!state.customOffer && <button onClick={()=>go("detail")}>Details</button>}

                  <td>{r.wish}</td>
                  <td>
                    <select value={r.status} onChange={e=>setStatus(r.id,e.target.value)}
                            style={{font:"inherit",fontSize:12.5,padding:"4px 8px",borderRadius:6,border:"1px solid var(--line)",background:"var(--paper)"}}>
                      {["neu","bestätigt","Rückfrage nötig","passt vielleicht zu anderem Paket","abgesagt","erschienen","möchte weitermachen"].map(o=>(
                        <option key={o} value={o}>{o}</option>

function StatusStep({ done, label, extra }){
  return (
    <li style={{display:"flex",gap:14,alignItems:"flex-start",padding:"14px 16px",background:"var(--paper-2)",borderRadius:10,border:"1px solid var(--line-soft)"}}>
      <span style={{
        width:24,height:24,borderRadius:99,
        background: done ? "var(--sage-deep)" : "var(--paper)",
        border:"1px solid "+(done?"var(--sage-deep)":"var(--line)"),
        color:"#fff",display:"grid",placeItems:"center",
        fontSize:13,flexShrink:0,marginTop:1
      }}>{done?"✓":""}</span>
      <div>
        <div style={{fontWeight:600,color:done?"var(--ink)":"var(--ink-3)"}}>{label}</div>
        {extra && <div style={{color:"var(--ink-3)",fontSize:13,marginTop:2}}>{extra}</div>}
      </div>
    </li>
  );
}

/* ============================================================
   ROOT
   ============================================================ */
function App(){
  const [screen,setScreen] = useState("start");
  const [state,setState] = useState({
    topics:[], existing:[], coord:"", targets:[],
    selectedPkg:null, pilotPkg:null, customOffer:false,
    slot:null, slots:[], registrations:[], ideas:[], dashboardTab:null,
    motivations:[], competences:[], commit:"", contexts:[], selectedRole:null,
  });
  function set(patch){ setState(s=>({...s,...patch})); }
  function go(s){ setScreen(s); window.scrollTo({top:0,behavior:"smooth"}); }

  // Persist lightly so refresh keeps work
  useEffect(()=>{
    try {
      const raw = localStorage.getItem("sisu-state");
      if (raw){ const p = JSON.parse(raw); if (p.state) setState(p.state); if (p.screen) setScreen(p.screen); }
    } catch(e){}
  },[]);
  useEffect(()=>{
    try { localStorage.setItem("sisu-state", JSON.stringify({state,screen})); } catch(e){}
  },[state,screen]);

  const isPublic = ["public","register"].includes(screen);

  return (
    <div className="app" data-screen-label={screen}>
      <Topbar go={go} screen={screen} hideNav={false}/>
      {{
        start:     <StartScreen go={go}/>,
        q1:        <Q1 state={state} set={set} go={go}/>,
        q2:        <Q2 state={state} set={set} go={go}/>,
        q3:        <Q3 state={state} set={set} go={go}/>,
        q4:        <Q4 state={state} set={set} go={go}/>,
        result:    <ResultScreen state={state} set={set} go={go}/>,
        detail:    <DetailScreen state={state} set={set} go={go}/>,
        next:      <NextScreen state={state} go={go}/>,
        slotForm:  <SlotForm state={state} set={set} go={go}/>,
        publishConfirm: <PublishConfirmScreen state={state} set={set} go={go}/>,
        aufruf:    <AufrufScreen state={state} go={go}/>,
        anzeige:   <AnzeigeScreen state={state} go={go}/>,
        public:    <PublicSlot state={state} go={go}/>,
        register:  <RegisterScreen state={state} set={set} go={go}/>,
        idea:           <IdeaScreen state={state} set={set} go={go}/>,
        eigenesAngebot: <EigenesAngebotForm state={state} set={set} go={go}/>,
        dashboard:      <Dashboard state={state} set={set} go={go}/>,
        m1:        <M1 state={state} set={set} go={go}/>,
        m2:        <M2 state={state} set={set} go={go}/>,
        m3:        <M3 state={state} set={set} go={go}/>,
        m4:        <M4 state={state} set={set} go={go}/>,
        mResult:   <MResult state={state} set={set} go={go}/>,
        mDetail:   <MDetail state={state} set={set} go={go}/>,
        mConfirm:  <MConfirm state={state} set={set} go={go}/>,
        portal:    <Portal state={state} set={set} go={go}/>,
      }[screen]}

      <footer style={{borderTop:"1px solid var(--line-soft)",padding:"24px 32px",color:"var(--ink-3)",fontSize:13,display:"flex",justifyContent:"space-between",maxWidth:1200,margin:"0 auto",width:"100%"}}>
        <span>SISU Mitmach-Planer · Prototyp</span>
        <span>
          <button onClick={()=>{localStorage.removeItem("sisu-state");location.reload();}}
                  style={{background:"none",border:0,color:"var(--ink-3)",cursor:"pointer",font:"inherit"}}>
            Prototyp zurücksetzen
          </button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
